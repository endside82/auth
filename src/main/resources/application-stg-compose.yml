spring:
  config:
    activate:
      on-profile: stg-compose
  datasource:
    write:
      jdbc-url: jdbc:mysql://${DB_HOST:mysql}:${DB_PORT:3306}/${DB_NAME:mydatabase}?autoReconnect=true&autoReconnection=true&useUnicode=true&characterEncoding=utf8&zeroDateTimeBehavior=convertToNull&useTimezone=true&serverTimezone=Asia/Seoul&useLegacyDatetimeCode=false
      username: ${DB_USERNAME:myuser}
      password: ${DB_PASSWORD:changeme}
      minimum-idle: 1
      maximum-pool-size: 2
      useServerPrepStmts: true
    read:
      jdbc-url: jdbc:mysql://${DB_READ_HOST:mysql}:${DB_PORT:3306}/${DB_NAME:mydatabase}?autoReconnect=true&autoReconnection=true&useUnicode=true&characterEncoding=utf8&zeroDateTimeBehavior=convertToNull&useTimezone=true&serverTimezone=Asia/Seoul&useLegacyDatetimeCode=false
      username: ${DB_USERNAME:myuser}
      password: ${DB_PASSWORD:changeme}
      minimum-idle: 1
      maximum-pool-size: 2
      useServerPrepStmts: true
  main:
    allow-bean-definition-overriding: true
  autoconfigure:
    exclude: org.springframework.boot.jdbc.autoconfigure.DataSourceAutoConfiguration
  jackson:
    time-zone: Asia/Seoul
  jpa:
    properties:
      hibernate:
        jdbc:
          time_zone: Asia/Seoul
  flyway:
    enabled: ${FLYWAY_ENABLED:false}
    baselineOnMigrate: ${FLYWAY_BASELINE_ON_MIGRATE:false}
    locations: "classpath:db/migration"
    validateMigrationNaming: ${FLYWAY_VALIDATE_MIGRATION_NAMING:false}
  docker:
    compose:
      lifecycle-management: none
server:
  error:
    include-exception: false
    include-stacktrace: never
    path: '/auth/error'
    whitelabel:
      enabled: false
  port: 38080
redis:
  host: ${REDIS_HOST:redis}
  port: ${REDIS_PORT:6379}
  auth: ${REDIS_AUTH:false}
  password: ${REDIS_PASSWORD:}
  authentication:
    database: 0
  user:
    database: 1
  sso:
    database: 2
  noti:
    database: 3
  type: STANDARD
server-config:
  urls: ${SERVER_CONFIG_URLS:http://localhost:3000,http://localhost:3010}
aws:
  ses:
    aws_key_id: ${AWS_SES_KEY_ID:your-ses-key-id}
    aws_key_password: ${AWS_SES_KEY_PASSWORD:your-ses-key-password}
    host: ${AWS_SES_HOST:email-smtp.region.amazonaws.com}
    port: 587
    configuration: ${AWS_SES_CONFIGURATION:}
    from: ${AWS_SES_FROM:noreply@example.com}
    fromName: ${AWS_SES_FROM_NAME:Your App}
  sns:
    ec2policy: ${AWS_SNS_EC2_POLICY:false}
    credentials:
      access-key: ${AWS_ACCESS_KEY:your-access-key}
      secret-key: ${AWS_SECRET_KEY:your-secret-key}
ssh:
  use: false
jwt:
  secret: ${JWT_SECRET:your-jwt-secret-key-min-32-characters}
  duplicate-login-check: ${JWT_DUPLICATE_LOGIN_CHECK:false}
oauth:
  google:
    audiences: ${OAUTH_GOOGLE_AUDIENCES:}
  kakao:
    user-info-url: ${OAUTH_KAKAO_USER_INFO_URL:https://kapi.kakao.com/v2/user/me}
  naver:
    user-info-url: ${OAUTH_NAVER_USER_INFO_URL:https://openapi.naver.com/v1/nid/me}
toss:
  client-id: ${TOSS_CLIENT_ID:your-toss-client-id}
  client-secret: ${TOSS_CLIENT_SECRET:your-toss-client-secret}
email:
  verify: ${EMAIL_VERIFY:false}
  check:
    page: email-dev
  exceed_cnt: 1000
sms:
  verify: ${SMS_VERIFY:false}
  exceed_cnt: 1000
otp:
  bypass:
    enabled: ${OTP_BYPASS_ENABLED:true}
